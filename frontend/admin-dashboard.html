<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css" />

    <style>
        .dashboard-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto auto;
            gap: 12px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            border: 1px solid #e5e7eb;
            padding: 10px;
        }

        table th {
            background: #f3f4f6;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .small-btn {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .logout-btn {
            background: #fee2e2;
            color: red;
        }

        .filter-btn {
            background: #4f46e5;
            color: white;
        }

        .export-btn {
            background: #10b981;
            color: white;
        }
    </style>
</head>

<body>

<div class="container" style="max-width:1200px;">
<div class="dashboard-card">

<!-- Top -->
<div class="top-bar">
    <h1>Admin Dashboard</h1>
    <button class="small-btn logout-btn" onclick="logout()">Logout</button>
</div>

<!-- ================= COUPON SECTION ================= -->

<div style="margin-bottom: 25px; padding: 18px; background: #f9fafb; border-radius: 12px;">
    <h2>Add Coupon Offer</h2>

    <div class="filter-row" style="grid-template-columns: 1fr 1fr auto;">
        <select id="adminDiscount" title="Select Discount">
            <option value="">Select Discount</option>
            <option value="51">51%</option>
            <option value="52">52%</option>
            <option value="53">53%</option>
            <option value="54">54%</option>
            <option value="55">55%</option>
            <option value="56">56%</option>
            <option value="57">57%</option>
            <option value="58">58%</option>
            <option value="59">59%</option>
            <option value="60">60%</option>
            <option value="61">61%</option>
            <option value="62">62%</option>
            <option value="63">63%</option>
            <option value="64">64%</option>
            <option value="65">65%</option>
            <option value="66">66%</option>
            <option value="67">67%</option>
            <option value="68">68%</option>
            <option value="69">69%</option>
            <option value="70">70%</option>
        </select>

        <input type="text" id="adminCouponCode" placeholder="Enter Coupon Code" />

        <button class="small-btn filter-btn" onclick="saveCouponOffer()">Add Coupon</button>
    </div>

    <div id="offerMessage" class="message-box"></div>

    <!-- Coupon Table -->
    <h3>Coupon List</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Discount</th>
                <th>Coupon</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="couponTableBody"></tbody>
    </table>
</div>

<!-- ================= FILTER SECTION ================= -->

<div class="filter-row">
    <input type="date" id="fromDate" title="From Date">
    <input type="date" id="toDate" title="To Date">

    <select id="purchaseStatusFilter" title="Purchase Status Filter">
        <option value="">All</option>
        <option value="PURCHASED">Purchased</option>
        <option value="NOT_PURCHASED">Not Purchased</option>
    </select>

    <button class="small-btn filter-btn" onclick="loadForms()">Filter</button>
    <button class="small-btn export-btn" onclick="exportCsv()">Export CSV</button>
</div>

<!-- ================= DATA TABLE ================= -->

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Discount</th>
            <th>Coupon</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

</div>
</div>

<script>

const API_BASE_URL = "http://localhost:8081";
let editingCouponId = null;

// check login
if (localStorage.getItem("adminLoggedIn") !== "true") {
    window.location.href = "admin-login.html";
}

// ================= COUPON FUNCTIONS =================

async function saveCouponOffer() {

    const discount = document.getElementById("adminDiscount").value;
    const code = document.getElementById("adminCouponCode").value.trim();

    if (!discount || !code) {
        alert("Fill all fields");
        return;
    }

    const payload = {
        discountPercentage: parseInt(discount),
        couponCode: code
    };

    const isEdit = editingCouponId !== null;

    let url = isEdit
        ? `${API_BASE_URL}/api/admin/coupon-offers/${editingCouponId}`
        : `${API_BASE_URL}/api/admin/coupon-offers`;

    let method = isEdit ? "PUT" : "POST";

    await fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    editingCouponId = null;
    document.getElementById("adminDiscount").value = "";
    document.getElementById("adminCouponCode").value = "";

    loadCouponOffers();
}

async function loadCouponOffers() {

    const res = await fetch(`${API_BASE_URL}/api/admin/coupon-offers`);
    const data = await res.json();

    const body = document.getElementById("couponTableBody");
    body.innerHTML = "";

    data.forEach(item => {
        body.innerHTML += `
            <tr>
                <td>${item.id}</td>
                <td>${item.discountPercentage}%</td>
                <td>${item.couponCode}</td>
                <td>
                    <button onclick="editCoupon(${item.id}, ${item.discountPercentage}, '${item.couponCode}')">Edit</button>
                    <button onclick="deleteCoupon(${item.id})">Delete</button>
                </td>
            </tr>
        `;
    });
}

function editCoupon(id, discount, code) {
    editingCouponId = id;
    document.getElementById("adminDiscount").value = discount;
    document.getElementById("adminCouponCode").value = code;
}

async function deleteCoupon(id) {
    if (!confirm("Delete this coupon?")) return;

    await fetch(`${API_BASE_URL}/api/admin/coupon-offers/${id}`, {
        method: "DELETE"
    });

    loadCouponOffers();
}

// ================= FORM DATA =================

async function loadForms() {

    const fromDate = document.getElementById("fromDate").value;
    const toDate = document.getElementById("toDate").value;
    const status = document.getElementById("purchaseStatusFilter").value;

    let params = new URLSearchParams();

    if (fromDate) params.append("fromDate", fromDate);
    if (toDate) params.append("toDate", toDate);
    if (status) params.append("purchaseStatus", status);

    const res = await fetch(`${API_BASE_URL}/api/admin/forms?${params}`);
    const data = await res.json();

    const body = document.getElementById("tableBody");
    body.innerHTML = "";

    data.forEach(item => {
        body.innerHTML += `
            <tr>
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.className}</td>
                <td>${item.phoneNumber}</td>
                <td>${item.purchaseStatus}</td>
                <td>${item.discountPercentage || ""}</td>
                <td>${item.couponCode || ""}</td>
                <td>${new Date(item.createdAt).toLocaleString()}</td>
            </tr>
        `;
    });
}

function exportCsv() {

    const fromDate = document.getElementById("fromDate").value;
    const toDate = document.getElementById("toDate").value;
    const status = document.getElementById("purchaseStatusFilter").value;

    let params = new URLSearchParams();

    if (fromDate) params.append("fromDate", fromDate);
    if (toDate) params.append("toDate", toDate);
    if (status) params.append("purchaseStatus", status);

    window.open(`${API_BASE_URL}/api/admin/forms/export?${params}`);
}

function logout() {
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "admin-login.html";
}

// INIT
loadCouponOffers();
loadForms();

</script>

</body>
</html>
