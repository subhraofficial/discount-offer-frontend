<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css" />

    <style>
        .dashboard-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .filter-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto auto;
            gap: 12px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            border: 1px solid #e5e7eb;
            padding: 10px;
        }

        table th {
            background: #f3f4f6;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .small-btn {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }

        .logout-btn {
            background: #fee2e2;
            color: red;
        }

        .filter-btn {
            background: #4f46e5;
            color: white;
        }

        .export-btn {
            background: #10b981;
            color: white;
        }
    </style>
</head>

<body>

<div class="container" style="max-width:1200px;">
<div class="dashboard-card">

<!-- Top -->
<div class="top-bar">
    <h1>Admin Dashboard</h1>
    <button class="small-btn logout-btn" onclick="logout()">Logout</button>
</div>

<!-- ================= COUPON SECTION ================= -->

<div style="margin-bottom: 25px; padding: 18px; background: #f9fafb; border-radius: 12px;">
    <h2>Add Coupon Offer</h2>

    <div class="filter-row" style="grid-template-columns: 1fr 1fr auto;">
        <select id="adminDiscount" title="Select Flat Discount Amount">
            <option value="">Select Flat Discount Amount</option>
            <option value="220">₹220 OFF</option>
            <option value="249">₹249 OFF</option>
            <option value="299">₹299 OFF</option>
            <option value="349">₹349 OFF</option>
            <option value="399">₹399 OFF</option>
            <option value="449">₹449 OFF</option>
            <option value="500">₹500 OFF</option>
            <option value="549">₹549 OFF</option>
            <option value="600">₹600 OFF</option>
            <option value="230">₹230 OFF</option>
            <option value="240">₹240 OFF</option>
            <option value="270">₹270 OFF</option>
            <option value="280">₹280 OFF</option>
            <option value="290">₹290 OFF</option>
            <option value="310">₹310 OFF</option>
            <option value="320">₹320 OFF</option>
            <option value="330">₹330 OFF</option>
            <option value="340">₹340 OFF</option>
            <option value="360">₹360 OFF</option>
            <option value="370">₹370 OFF</option>
            <option value="380">₹380 OFF</option>
            <option value="390">₹390 OFF</option>
            <option value="410">₹410 OFF</option>
            <option value="420">₹420 OFF</option>
            <option value="430">₹430 OFF</option>
            <option value="440">₹440 OFF</option>
            <option value="460">₹460 OFF</option>
            <option value="470">₹470 OFF</option>
            <option value="480">₹480 OFF</option>
            <option value="490">₹490 OFF</option>
            <option value="510">₹510 OFF</option>
            <option value="520">₹520 OFF</option>
            <option value="530">₹530 OFF</option>
            <option value="540">₹540 OFF</option>
            <option value="560">₹560 OFF</option>
            <option value="570">₹570 OFF</option>
            <option value="580">₹580 OFF</option>
            <option value="590">₹590 OFF</option>
        </select>

        <input type="text" id="adminCouponCode" placeholder="Enter Coupon Code" />

        <button class="small-btn filter-btn" onclick="saveCouponOffer()">Add Coupon</button>
    </div>

    <div id="offerMessage" class="message-box"></div>

    <div style="margin-top: 20px; margin-bottom: 20px; padding: 16px; background: #f3f4f6; border-radius: 12px;">
        <h3 style="margin-bottom: 10px;">Upload Coupon CSV</h3>

        <input type="file" id="csvFileInput" accept=".csv" title="Select a CSV file to upload coupon codes" />
        <button type="button" class="small-btn export-btn" onclick="uploadCouponCsv()">Upload CSV</button>

        <p style="margin-top:10px; font-size:14px; color:#555;">
            CSV format should contain one column: <b>coupon_code</b>
        </p>
    </div>

    <!-- Coupon Table -->
    <h3>Coupon List</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Discount</th>
                <th>Coupon</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="couponTableBody"></tbody>
    </table>

    <div style="margin-top: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;">
        <div>
            <label for="couponPageSize">Show</label>
            <select id="couponPageSize" onchange="changeCouponPageSize()">
                <option value="10">10</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <span>entries</span>
        </div>
    
        <div>
            <button type="button" class="small-btn" onclick="prevCouponPage()">Previous</button>
            <span id="couponPageInfo" style="margin: 0 10px;">Page 1</span>
            <button type="button" class="small-btn" onclick="nextCouponPage()">Next</button>
        </div>
    </div>
</div>

<!-- ================= FILTER SECTION ================= -->

<div class="filter-row">
    <input type="date" id="fromDate" title="From Date">
    <input type="date" id="toDate" title="To Date">

    <select id="purchaseStatusFilter" title="Purchase Status Filter">
        <option value="">All</option>
        <option value="PURCHASED">Purchased</option>
        <option value="NOT_PURCHASED">Not Purchased</option>
    </select>

    <button class="small-btn filter-btn" onclick="loadForms()">Filter</button>
    <button class="small-btn export-btn" onclick="exportCsv()">Export CSV</button>
</div>

<!-- ================= DATA TABLE ================= -->

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Discount</th>
            <th>Coupon</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<div style="margin-top: 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap;">
    <div>
        <label for="formPageSize">Show</label>
        <select id="formPageSize" onchange="changeFormPageSize()">
            <option value="10">10</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>
        <span>entries</span>
    </div>

    <div>
        <button type="button" class="small-btn" onclick="prevFormPage()">Previous</button>
        <span id="formPageInfo" style="margin: 0 10px;">Page 1</span>
        <button type="button" class="small-btn" onclick="nextFormPage()">Next</button>
    </div>
</div>

</div>
</div>

<script>

const API_BASE_URL = "https://discount-offer-app.onrender.com";
let editingCouponId = null;

let allCoupons = [];
let couponCurrentPage = 1;
let couponPageSize = 10;

let allForms = [];
let formCurrentPage = 1;
let formPageSize = 10;

// check login
if (localStorage.getItem("adminLoggedIn") !== "true") {
    window.location.href = "admin-login.html";
}

// ================= COUPON FUNCTIONS =================

async function saveCouponOffer() {

    const discount = document.getElementById("adminDiscount").value;
    const code = document.getElementById("adminCouponCode").value.trim();

    if (!discount || !code) {
        alert("Fill all fields");
        return;
    }

    const payload = {
        discountPercentage: parseInt(discount),
        couponCode: code
    };

    const isEdit = editingCouponId !== null;

    let url = isEdit
        ? `${API_BASE_URL}/api/admin/coupon-offers/${editingCouponId}`
        : `${API_BASE_URL}/api/admin/coupon-offers`;

    let method = isEdit ? "PUT" : "POST";

    await fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    editingCouponId = null;
    document.getElementById("adminDiscount").value = "";
    document.getElementById("adminCouponCode").value = "";

    loadCouponOffers();
}

async function loadCouponOffers() {
    try {
        const response = await fetch(`${API_BASE_URL}/api/admin/coupon-offers`);
        const data = await response.json();

        allCoupons = data;
        couponCurrentPage = 1;
        renderCouponTable();
    } catch (error) {
        console.error("Failed to load coupon offers", error);
    }
}

function renderCouponTable() {
    const couponTableBody = document.getElementById("couponTableBody");
    couponTableBody.innerHTML = "";

    if (allCoupons.length === 0) {
        couponTableBody.innerHTML = `<tr><td colspan="4" style="text-align:center;">No coupon offers added</td></tr>`;
        document.getElementById("couponPageInfo").textContent = "Page 0";
        return;
    }

    const start = (couponCurrentPage - 1) * couponPageSize;
    const end = start + couponPageSize;
    const pageItems = allCoupons.slice(start, end);

    pageItems.forEach(item => {
        const safeCode = (item.couponCode || "").replace(/'/g, "\\'");
        couponTableBody.innerHTML += `
            <tr>
                <td>${item.id ?? ""}</td>
                <td>${item.discountPercentage ?? ""}</td>
                <td>${item.couponCode ?? ""}</td>
                <td>
                    <button type="button" onclick="editCoupon(${item.id}, ${item.discountPercentage}, '${safeCode}')">Edit</button>
                    <button type="button" onclick="deleteCoupon(${item.id})">Delete</button>
                </td>
            </tr>
        `;
    });

    const totalPages = Math.ceil(allCoupons.length / couponPageSize);
    document.getElementById("couponPageInfo").textContent = `Page ${couponCurrentPage} of ${totalPages}`;
}

function changeCouponPageSize() {
    couponPageSize = parseInt(document.getElementById("couponPageSize").value);
    couponCurrentPage = 1;
    renderCouponTable();
}

function nextCouponPage() {
    const totalPages = Math.ceil(allCoupons.length / couponPageSize);
    if (couponCurrentPage < totalPages) {
        couponCurrentPage++;
        renderCouponTable();
    }
}

function prevCouponPage() {
    if (couponCurrentPage > 1) {
        couponCurrentPage--;
        renderCouponTable();
    }
}

function editCoupon(id, discount, code) {
    editingCouponId = id;
    document.getElementById("adminDiscount").value = discount;
    document.getElementById("adminCouponCode").value = code;
}

async function deleteCoupon(id) {
    if (!confirm("Delete this coupon?")) return;

    await fetch(`${API_BASE_URL}/api/admin/coupon-offers/${id}`, {
        method: "DELETE"
    });

    loadCouponOffers();
}

async function uploadCouponCsv() {
    const fileInput = document.getElementById("csvFileInput");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a CSV file.");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch(`${API_BASE_URL}/api/admin/coupon-offers/upload-csv`, {
            method: "POST",
            body: formData
        });

        const result = await response.text();

        alert(result);
        fileInput.value = "";
        loadCouponOffers();
    } catch (error) {
        console.error("CSV upload failed:", error);
        alert("Failed to upload CSV.");
    }
}

// ================= FORM DATA =================

async function loadForms() {
    const fromDate = document.getElementById("fromDate").value;
    const toDate = document.getElementById("toDate").value;
    const purchaseStatus = document.getElementById("purchaseStatusFilter").value;

    const params = new URLSearchParams();

    if (fromDate) params.append("fromDate", fromDate);
    if (toDate) params.append("toDate", toDate);
    if (purchaseStatus) params.append("purchaseStatus", purchaseStatus);

    try {
        const response = await fetch(`${API_BASE_URL}/api/admin/forms?${params.toString()}`);
        const data = await response.json();

        allForms = data;
        formCurrentPage = 1;
        renderFormTable();
    } catch (error) {
        console.error("Failed to load forms", error);
    }
}

function renderFormTable() {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";

    if (allForms.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;">No data found</td></tr>`;
        document.getElementById("formPageInfo").textContent = "Page 0";
        return;
    }

    const start = (formCurrentPage - 1) * formPageSize;
    const end = start + formPageSize;
    const pageItems = allForms.slice(start, end);

    pageItems.forEach(item => {
        tableBody.innerHTML += `
            <tr>
                <td>${item.id ?? ""}</td>
                <td>${item.name ?? ""}</td>
                <td>${item.className ?? ""}</td>
                <td>${item.phoneNumber ?? ""}</td>
                <td>${item.purchaseStatus ?? ""}</td>
                <td>${item.discountPercentage ?? ""}</td>
                <td>${item.couponCode ?? ""}</td>
                <td>${formatDate(item.createdAt)}</td>
            </tr>
        `;
    });

    const totalPages = Math.ceil(allForms.length / formPageSize);
    document.getElementById("formPageInfo").textContent = `Page ${formCurrentPage} of ${totalPages}`;
}

function changeFormPageSize() {
    formPageSize = parseInt(document.getElementById("formPageSize").value);
    formCurrentPage = 1;
    renderFormTable();
}

function nextFormPage() {
    const totalPages = Math.ceil(allForms.length / formPageSize);
    if (formCurrentPage < totalPages) {
        formCurrentPage++;
        renderFormTable();
    }
}

function prevFormPage() {
    if (formCurrentPage > 1) {
        formCurrentPage--;
        renderFormTable();
    }
}

function formatDate(dateString) {
    if (!dateString) return "";
    return new Date(dateString).toLocaleString();
}

function exportCsv() {

    const fromDate = document.getElementById("fromDate").value;
    const toDate = document.getElementById("toDate").value;
    const status = document.getElementById("purchaseStatusFilter").value;

    let params = new URLSearchParams();

    if (fromDate) params.append("fromDate", fromDate);
    if (toDate) params.append("toDate", toDate);
    if (status) params.append("purchaseStatus", status);

    window.open(`${API_BASE_URL}/api/admin/forms/export?${params}`);
}

function logout() {
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "admin-login.html";
}

// INIT
loadCouponOffers();
loadForms();

</script>

</body>
</html>
