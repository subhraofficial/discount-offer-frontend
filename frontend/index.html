<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Discount Code</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div style="text-align:center; margin-bottom:12px;">
                <div style="font-size:14px; color:#6b7280;">Powered by</div>
                <div style="font-size:24px; font-weight:bold; color:#4f46e5;">Som's Classroom</div>
        </div>

            <h1>Claim Your Discount Code Now</h1>
            <p class="subtitle">Fill in your details and unlock your special offer</p>

            <form id="discountForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required />
                </div>

                <div class="form-group">
                    <label for="className">Class</label>
                    <input type="text" id="className" placeholder="Enter your class" required />
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="text" id="phoneNumber" placeholder="Enter your phone number" required />
                </div>

                <div class="form-group">
                    <label for="purchaseStatus">Purchase Status</label>
                    <select id="purchaseStatus" required>
                        <option value="">Select Purchase Status</option>
                        <option value="PURCHASED">Purchased</option>
                        <option value="NOT_PURCHASED">Not Purchased</option>
                    </select>
                </div>

                <button type="submit" class="primary-btn">GET DISCOUNT CODE</button>
            </form>

            <button id="shareBtn" class="share-btn">🎁 SHARE THIS FOR MORE DISCOUNT</button>

            <div id="messageBox" class="message-box"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
