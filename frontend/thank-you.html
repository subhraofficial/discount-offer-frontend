<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="form-card" style="text-align: center;">
            <div style="text-align:center; margin-bottom:12px;">
                <div style="font-size:14px; color:#6b7280;">Powered by</div>
                <div style="font-size:24px; font-weight:bold; color:#4f46e5;">Som's Classroom</div>
            </div>
            <h1>Thank You 🎉</h1>
            <p class="subtitle" id="thankMessage">Your purchase is already confirmed.</p>

            <button onclick="window.location.href='index.html'" class="primary-btn">GO BACK</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const message = params.get("message");

        if (message) {
            document.getElementById("thankMessage").textContent = message;
        }
    </script>
</body>
</html>
